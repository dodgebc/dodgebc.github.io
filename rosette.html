  var off=0;for(var i=0;i<nCube;i++){cubeArr.set(results[i],off);off+=results[i].length;}
  gridArr=results[nCube];
  rawWave=results[nCube+1];rawFlux=results[nCube+2];rawVar=results[nCube+3];
  rawGx=results[nCube+4];rawGy=results[nCube+5];
  setProgress(1);

  Plotly.newPlot(mapDiv,MAP_TRACES,MAP_LAYOUT,
    {scrollZoom:true,responsive:true,displayModeBar:true,
     modeBarButtonsToRemove:['select2d','lasso2d','autoScale2d','resetScale2d']});
  Plotly.newPlot(specDiv,SPEC_TRACES,SPEC_LAYOUT,
    {responsive:true,displayModeBar:false});
  Plotly.restyle(mapDiv,{source:[renderDiffuse(INIT_WI,INIT_CMAX)]},[0]);

  var initPidx=gridArr[INIT_ROW*NX+INIT_COL];
  if(initPidx>=0){
    var initSpec=new Array(N_WAVE);
    for(var i=0;i<N_WAVE;i++) initSpec[i]=cubeArr[i*N_PIX+initPidx];
    curSpec=initSpec;
    Plotly.restyle(specDiv,{y:[initSpec]},[0]);
    Plotly.restyle(specDiv,{x:[[MODEL_WAVE[INIT_WI],MODEL_WAVE[INIT_WI]]],y:[[0,curCmax]]},[1]);
    Plotly.relayout(specDiv,{'yaxis.range':[0,curCmax]});
    Plotly.restyle(mapDiv,{x:[[INIT_COL]],y:[[INIT_ROW]]},[1]);
    var initRaw=computeRawSpec(INIT_COL,INIT_ROW);
    Plotly.restyle(specDiv,{x:[initRaw.x],y:[initRaw.y],'error_y.array':[initRaw.err]},[2]);
    var iRa=(RA_MAX-INIT_COL*PIX_SIZE_DEG).toFixed(4);
    var iDec=(DEC_MAX-INIT_ROW*PIX_SIZE_DEG).toFixed(4);
    info.textContent='RA '+iRa+'°  Dec '+iDec+'°  pixel '+initPidx;
  }

  loadEl.style.display='none';
  setTimeout(function(){Plotly.Plots.resize(mapDiv);Plotly.Plots.resize(specDiv);},50);

  mapDiv.on('plotly_click',function(data){
    var pt=data.points[0];
    if(pt.curveNumber!==0)return;
    var col=Math.round(pt.x),row=Math.round(pt.y);
    if(col<0||col>=NX||row<0||row>=NY)return;
    var pidx=gridArr[row*NX+col];
    if(pidx<0){info.textContent='empty pixel (outside field)';return;}
    var spec=new Array(N_WAVE);
    for(var i=0;i<N_WAVE;i++) spec[i]=cubeArr[i*N_PIX+pidx];
    curSpec=spec;
    var wv=MODEL_WAVE[curWi];
    Plotly.restyle(specDiv,{y:[spec]},[0]);
    Plotly.restyle(specDiv,{x:[[wv,wv]],y:[[0,curCmax]]},[1]);
    Plotly.relayout(specDiv,{'yaxis.range':[0,curCmax]});
    Plotly.restyle(mapDiv,{x:[[pt.x]],y:[[pt.y]]},[1]);
    var raw=computeRawSpec(col,row);
    Plotly.restyle(specDiv,{x:[raw.x],y:[raw.y],'error_y.array':[raw.err]},[2]);
    var ra_c=(RA_MAX-col*PIX_SIZE_DEG).toFixed(4);
    var dec_c=(DEC_MAX-row*PIX_SIZE_DEG).toFixed(4);
    info.textContent='RA '+ra_c+'°  Dec '+dec_c+'°  pixel '+pidx;
  });
})();
</script>
</body>
</html>
